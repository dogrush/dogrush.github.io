<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a1a5c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="500" height="300" fill="url(#bg3)"/>
  <!-- decorative robot arm lines -->
  <polyline points="60,250 60,150 130,100 200,130" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <circle cx="60" cy="150" r="4" fill="rgba(255,255,255,0.12)"/>
  <circle cx="130" cy="100" r="4" fill="rgba(255,255,255,0.12)"/>
  <circle cx="200" cy="130" r="4" fill="rgba(255,255,255,0.12)"/>
  <polyline points="300,250 320,180 380,140 430,160" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <circle cx="320" cy="180" r="4" fill="rgba(255,255,255,0.12)"/>
  <circle cx="380" cy="140" r="4" fill="rgba(255,255,255,0.12)"/>
  <circle cx="430" cy="160" r="4" fill="rgba(255,255,255,0.12)"/>
  <line x1="200" y1="130" x2="250" y2="200" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="380" y1="140" x2="250" y2="200" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- keyword badge -->
  <rect x="155" y="115" width="190" height="60" rx="6" fill="rgba(255,255,255,0.13)"/>
  <text x="250" y="152" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="rgba(255,255,255,0.92)">Embodied AI</text>
</svg>