<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c3a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="500" height="300" fill="url(#bg4)"/>
  <!-- decorative memory grid -->
  <rect x="50" y="50" width="60" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="120" y="50" width="60" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="190" y="50" width="60" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="260" y="50" width="60" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="330" y="50" width="60" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="50" y="210" width="60" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="120" y="210" width="60" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="190" y="210" width="60" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="260" y="210" width="60" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="330" y="210" width="60" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- arrows crossing the grid -->
  <line x1="80" y1="90" x2="80" y2="210" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="220" y1="90" x2="220" y2="210" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="360" y1="90" x2="360" y2="210" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- keyword badge -->
  <rect x="115" y="115" width="270" height="60" rx="6" fill="rgba(255,255,255,0.13)"/>
  <text x="250" y="140" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.92)">Compute-in-Memory</text>
  <text x="250" y="166" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.92)">(CIM)</text>
</svg>