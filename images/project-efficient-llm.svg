<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A73E8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="500" height="300" fill="url(#bg1)"/>
  
  <!-- Icon: LLM Model Structure (Transformer-based) -->
  <g transform="translate(365, 65)">
    <rect x="0" y="0" width="100" height="130" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- Input layer -->
    <rect x="20" y="15" width="60" height="12" rx="2" fill="rgba(255,255,255,0.2)"/>
    <text x="50" y="23" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.7)">Input</text>
    
    <!-- Transformer Encoder blocks -->
    <rect x="10" y="35" width="80" height="18" rx="3" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="50" y="47" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.6)">Attention</text>
    
    <rect x="10" y="58" width="80" height="18" rx="3" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="50" y="70" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.6)">Feed Forward</text>
    
    <rect x="10" y="81" width="80" height="18" rx="3" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="50" y="93" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">×N Layers</text>
    
    <!-- Output layer -->
    <rect x="20" y="108" width="60" height="12" rx="2" fill="rgba(255,255,255,0.2)"/>
    <text x="50" y="116" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.7)">Output</text>
    
    <!-- Arrows -->
    <line x1="50" y1="27" x2="50" y2="35" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <path d="M50,53 L50,58" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <path d="M50,76 L50,81" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <path d="M50,99 L50,108" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  </g>
  
  <!-- Decorative circuit lines -->
  <line x1="0" y1="80" x2="180" y2="80" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="160" x2="280" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="240" x2="230" y2="240" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="120" y1="0" x2="120" y2="300" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="280" y1="0" x2="280" y2="300" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <circle cx="120" cy="80" r="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="280" cy="160" r="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="230" cy="240" r="3" fill="rgba(255,255,255,0.12)"/>
  
  <!-- Keyword badge - larger text -->
  <rect x="20" y="110" width="240" height="75" rx="8" fill="rgba(255,255,255,0.13)"/>
  <text x="140" y="145" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="26" font-weight="600" fill="rgba(255,255,255,0.95)">Efficient</text>
  <text x="140" y="175" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="26" font-weight="600" fill="rgba(255,255,255,0.95)">AI / LLM</text>
</svg>