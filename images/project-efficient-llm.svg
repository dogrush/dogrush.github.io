<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A73E8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="500" height="300" fill="url(#bg1)"/>
  <!-- decorative circuit lines -->
  <line x1="0" y1="80" x2="200" y2="80" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="160" x2="300" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="240" x2="250" y2="240" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="300" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="300" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="200" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <circle cx="150" cy="80" r="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="300" cy="160" r="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="250" cy="240" r="3" fill="rgba(255,255,255,0.12)"/>
  <!-- keyword badge -->
  <rect x="145" y="120" width="210" height="60" rx="6" fill="rgba(255,255,255,0.13)"/>
  <text x="250" y="145" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.92)">Efficient</text>
  <text x="250" y="172" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.92)">AI / LLM</text>
</svg>